name: Deploy Economic Calendar Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/economic-calendar/**"
      - ".github/workflows/deploy-economic-calendar.yml"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Supabase Edge Function
    runs-on: ubuntu-latest

    env:
      SUPABASE_PROJECT_REF: nsnjgfcuuesqibmpbiuv
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing GitHub secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "$FMP_API_KEY" ]; then
            echo "Missing GitHub secret: FMP_API_KEY"
            exit 1
          fi

      - name: Deploy economic calendar function
        run: |
          supabase functions deploy economic-calendar \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt

      - name: Set economic calendar provider secrets
        run: |
          supabase secrets set \
            ECONOMIC_CALENDAR_PROVIDER="auto" \
            ECONOMIC_CALENDAR_API_KEY="$FMP_API_KEY" \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Verify function endpoint
        run: |
          curl -fsS "https://$SUPABASE_PROJECT_REF.functions.supabase.co/economic-calendar?range=today&timezone=Asia/Jakarta" | head -c 1000
